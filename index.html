<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatálogoFácil PRO</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<header class="header">
  <div class="header-left">
    <img src="logo.png" class="logo">
    <div>
      <h1>CatálogoFácil PRO</h1>
      <p>Tu catálogo listo en segundos</p>
    </div>
  </div>

  <button id="btnBackup" class="btn">Backup</button>
</header>

<section class="config-negocio">
  <input id="nombreNegocio" placeholder="Nombre del negocio" class="input">

  <input type="file" id="logoNegocio">
  <img id="previewLogo" class="logo-preview">
</section>

<section class="controls">

  <div class="left-controls">
    <button id="btnAgregar" class="btn primary" disabled>➕ Nuevo Producto</button>

    <select id="filtroCategoria" class="input"></select>

    <input id="nuevaCategoria" placeholder="Nueva categoría" class="input">

    <button id="btnAddCategoria" class="btn">Agregar</button>
  </div>

  <div class="right-controls">
    <button id="btnPDF" class="btn accent">📄 PDF</button>
    <button id="btnLimpiar" class="btn outline">🧹 Limpiar</button>
  </div>

</section>

<section class="dashboard">
  <div><b id="statTotal">0</b> Productos</div>
  <div><b id="statOfertas">0</b> Ofertas</div>
  <div><b id="statDestacados">0</b> Destacados</div>
  <div><b id="statCategorias">0</b> Categorías</div>
</section>

<section id="contenedorProductos" class="grid"></section>

<!-- MODAL -->
<div id="modal" class="modal oculto">
  <div class="modal-box">

    <h2>Agregar producto</h2>

    <input id="nombre" placeholder="Nombre">
    <input id="precio" type="number" placeholder="Precio">
    <select id="categoria"></select>

    <input id="imagen" type="file">
    <img id="preview">

    <label><input type="checkbox" id="destacado"> ⭐ Destacado</label>
    <label><input type="checkbox" id="oferta"> 🔥 Oferta</label>

    <div class="modal-buttons">
      <button id="guardar" class="btn primary">Guardar</button>
      <button id="cancelar" class="btn outline">Cancelar</button>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
